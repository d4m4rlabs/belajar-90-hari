<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hari pertama-js</title>
    <style>
        body {
         text-align: center;
         font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         background-color: #0f0f0f;
         color:white;
         padding:40px;
        }
        h1 {
            font-size: 28px;
            color: #a855f7;
            margin-bottom:8px;
        }
        p {
            font-size:16px;
            color: #aaaaaa;
            margin-bottom: 24px;
        }
        #hasil{
            font-size: 18px;
            color: white;
            background-color: #1a1a1a;
            padding: 16px 24px;
            border-radius: 10px;
            margin-bottom: 24px;
            display: inline-block;
            border: 1px solid #a855f7;
            min-width:300px;
        }
        .tombol-grup{
            display: flex;
            justify-content:center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background-color: #a855f7;
            color:white;
            padding: 12px 24px;
            border:none;
            border-radius: 8px;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 15px;
            transition: background-color 0.3s;
        }
        button:hover{
            background-color: #7c3aed ;
        }
        #tombol-reset {
            background-color: transparent;
            border: 1px solid #a855f7;
            color: #a855f7;
        }
        #tombol-reset:hover{
            background-color: #1a1a1a;
        }
    </style>
</head>
<body>
    <h1>kyokai-90 hari fullstack</h1>
    <p>Perjalanan dimulai hari ini.tidak ada yang instan</p>

    <div id="hasil">siapa kamu?</div>

    <br>
    <div class="tombol-grup">
        <button onclick="perkenalan()">perkenalan</button>
        <button onclick="tujuan()">tujuan 90 hari</button>
        <button onclick="tanggal()">tanggal </button>
        <button id="tombol-reset" onclick="reset()">Reset</button>
    </div>
    <script>
        function perkenalan() {
         document.getElementById("hasil").innerText ="Nama saya Kyokai Saya berminat dibagian cyber security!";
         document.getElementById("hasil").style.color ="#a855f7";
        }
        function tujuan(){
            document.getElementById("hasil").innerText ="tujuan saya cuma 1 yaitu fullstack dalam 90 hari";
            document.getElementById("hasil").style.color ="#22c55e";
        }
        function tanggal(){
        document.getElementById("hasil").innerText ="hari pertama 16-mei-2026 yang mengubah hidup saya kedepannya!";
        document.getElementById("hasil").style.color=" #a855f7";
        }       
        
        function reset(){
            document.getElementById("hasil").innerText ="siapa kamu?";
            document.getElementById("hasil").style.color ="white";
        }
    </script>
</body>
</html>
